<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JC STORE — Shop Online</title>
<meta name="description" content="Toys, daily goods, electronics and apparel from JC STORE — browse and order in English, Chinese, or Khmer.">
<meta name="theme-color" content="#0E6B54">
<meta property="og:title" content="JC STORE — Shop Online">
<meta property="og:description" content="Toys, daily goods, electronics and apparel — browse and order online.">
<meta property="og:type" content="website">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #F2F5F1;
  --paper-card: #FFFFFF;
  --ink: #16241C;
  --ink-soft: #55655D;
  --jade: #0E6B54;
  --jade-deep: #0A4E3E;
  --gold: #C99A2E;
  --gold-soft: #F3E4BE;
  --lacquer: #A63A32;
  --line: #E1E6DF;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Kantumruy Pro', 'Noto Sans Khmer', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body.lang-zh { font-family: 'Noto Sans SC', sans-serif; }
:focus-visible { outline: 2px solid var(--jade); outline-offset: 2px; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Language pills */
.lang-pill { padding: 6px 12px; border-radius: 9999px; font-size: 12px; font-weight: 700; color: var(--ink-soft); transition: all .15s; }
.lang-pill.active { background: var(--jade); color: #fff; }

/* Category filter pills */
.cat-pill { flex-shrink: 0; padding: 8px 16px; border-radius: 9999px; font-size: 13px; font-weight: 700; border: 1.5px solid var(--line); color: var(--ink-soft); background: var(--paper-card); white-space: nowrap; transition: all .15s; cursor: pointer; }
.cat-pill.active { background: var(--ink); border-color: var(--ink); color: #fff; }

/* Hero category tiles */
.cat-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 18px 10px; border-radius: 16px; background: var(--paper-card); border: 1px solid var(--line); transition: transform .15s, box-shadow .15s; cursor: pointer; }
.cat-tile:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(22,36,28,0.08); }
.cat-tile i { font-size: 22px; color: var(--jade); }
.cat-tile span { font-size: 13px; font-weight: 700; text-align: center; line-height: 1.25; }

/* Product card */
.product-card { background: var(--paper-card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; transition: transform .15s, box-shadow .15s; }
.product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(22,36,28,0.09); }
.product-card-img { position: relative; aspect-ratio: 1/1; background: #EAEEE8; overflow: hidden; }
.product-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.product-card-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
.product-cat { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--jade); }
.product-name { font-size: 14px; font-weight: 700; line-height: 1.35; min-height: 2.6em; }

/* Signature: dual-currency hang tag */
.price-tag { position: relative; display: inline-flex; flex-direction: column; align-self: flex-start; background: var(--paper); border: 1.5px dashed var(--gold); border-radius: 3px 10px 3px 10px; padding: 5px 11px 5px 16px; transform: rotate(-2deg); margin: 2px 0 4px; }
.price-tag::before { content: ''; position: absolute; left: 5px; top: 50%; width: 5px; height: 5px; background: var(--paper-card); border: 1px solid var(--gold); border-radius: 50%; transform: translateY(-50%); }
.price-tag .usd { font-weight: 900; font-size: 15px; line-height: 1.15; color: var(--ink); font-variant-numeric: tabular-nums; display: block; }
.price-tag .khr { font-size: 10.5px; font-weight: 700; color: var(--jade-deep); opacity: .85; font-variant-numeric: tabular-nums; display: block; }
.price-tag-flat { transform: none; padding: 4px 9px 4px 14px; margin: 0; }
.price-tag-flat::before { width: 4px; height: 4px; }

/* Stock badges */
.stock-badge { position: absolute; top: 8px; left: 8px; font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 9999px; color: #fff; }
.stock-badge.stock-low { background: var(--gold); color: var(--ink); }
.stock-badge.stock-out { background: rgba(22,36,28,0.62); }

/* Add-to-cart button */
.btn-add { margin-top: auto; background: var(--jade); color: #fff; font-weight: 800; font-size: 12.5px; padding: 9px 10px; border-radius: 10px; text-align: center; transition: background .15s; }
.btn-add:hover { background: var(--jade-deep); }
.btn-add.is-disabled { background: var(--line); color: var(--ink-soft); cursor: not-allowed; }

/* Quantity stepper */
.qty-stepper { display: flex; align-items: center; justify-content: space-between; margin-top: auto; background: var(--paper); border: 1px solid var(--line); border-radius: 10px; padding: 4px 6px; }
.qty-stepper button { width: 26px; height: 26px; border-radius: 8px; font-weight: 900; font-size: 15px; color: var(--jade-deep); background: var(--paper-card); border: 1px solid var(--line); line-height: 1; }
.qty-stepper button:disabled { opacity: .35; cursor: not-allowed; }
.qty-stepper span { font-weight: 800; font-size: 13px; min-width: 20px; text-align: center; }

/* Cart drawer lines */
.cart-line { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-bottom: 1px solid var(--line); }
.cart-line img { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; border: 1px solid var(--line); flex-shrink: 0; }
.cart-line-info { flex: 1; min-width: 0; }
.cart-line-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.cart-line-remove { font-size: 11px; color: var(--lacquer); font-weight: 700; margin-top: 4px; }

/* Payment method options */
.pay-option { cursor: pointer; border: 1.5px solid var(--line); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; transition: border-color .15s, background .15s; }
.pay-option.selected { border-color: var(--jade); background: rgba(14,107,84,0.06); }
.pay-option i { font-size: 18px; color: var(--jade); width: 20px; text-align: center; flex-shrink: 0; }
.pay-option span { font-size: 13.5px; font-weight: 700; }

/* Generic buttons */
.btn-primary { background: var(--jade); color: #fff; font-weight: 800; font-size: 13.5px; padding: 12px 16px; border-radius: 12px; transition: background .15s; }
.btn-primary:hover { background: var(--jade-deep); }
.btn-secondary { background: var(--paper); color: var(--ink); font-weight: 800; font-size: 13.5px; padding: 12px 16px; border-radius: 12px; border: 1.5px solid var(--line); transition: background .15s; }
.btn-secondary:hover { background: var(--line); }

/* Toasts */
#toastContainer { position: fixed; top: 16px; right: 16px; left: 16px; z-index: 200; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; pointer-events: none; }
.toast-item { color: #fff; font-size: 13px; font-weight: 700; padding: 11px 18px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.18); transform: translateX(30px); opacity: 0; transition: all .25s ease; max-width: 320px; }
.toast-item.show { transform: translateX(0); opacity: 1; }

@keyframes cartBounce { 0%,100%{transform:scale(1)} 40%{transform:scale(1.22)} 70%{transform:scale(0.94)} }
.cart-bounce { animation: cartBounce .35s ease; }

@keyframes fadeInUp { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform: translateY(0);} }
#heroHeadline { animation: fadeInUp .5s ease both; }
#categoryTiles { animation: fadeInUp .5s ease both; animation-delay: .08s; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
}

#cartDrawer { box-shadow: -10px 0 40px rgba(0,0,0,0.15); }
#syncModal { background: rgba(22,36,28,0.5); }

@media (max-width: 480px) {
  .product-name { min-height: 2.5em; }
}
</style>
</head>
<body class="lang-en">

<noscript>This storefront needs JavaScript enabled to browse and order.</noscript>

<!-- Toasts -->
<div id="toastContainer"></div>

<!-- ============== HEADER ============== -->
<header class="sticky top-0 z-40 bg-[var(--paper-card)]/95 backdrop-blur border-b" style="border-color:var(--line)">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-2.5 min-w-0">
      <img id="storeLogo" src="" alt="" class="h-9 w-auto rounded-md object-contain flex-shrink-0">
      <span id="storeName" class="font-black text-lg sm:text-xl tracking-tight truncate"></span>
    </div>
    <div class="flex items-center gap-1 bg-[var(--paper)] rounded-full p-1 border flex-shrink-0" style="border-color:var(--line)">
      <button class="lang-pill" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-pill" data-lang="zh" onclick="setLang('zh')">中文</button>
      <button class="lang-pill" data-lang="km" onclick="setLang('km')">ខ្មែរ</button>
    </div>
    <button id="cartBtn" onclick="openDrawer('cart')" data-i18n-aria="cart" class="relative flex items-center justify-center w-10 h-10 rounded-full text-white flex-shrink-0" style="background:var(--jade)">
      <i class="fas fa-basket-shopping"></i>
      <span id="cartBadge" class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full text-[10px] font-black flex items-center justify-center text-white" style="background:var(--lacquer)">0</span>
    </button>
  </div>
</header>

<main>
  <!-- ============== HERO ============== -->
  <section class="max-w-6xl mx-auto px-4 sm:px-6 pt-8 sm:pt-12 pb-6">
    <h1 id="heroHeadline" class="text-2xl sm:text-4xl font-black tracking-tight leading-tight max-w-3xl"></h1>
    <div id="categoryTiles" class="mt-6 grid grid-cols-2 sm:grid-cols-4 gap-3 max-w-3xl"></div>
  </section>

  <!-- ============== SEARCH / FILTER ============== -->
  <section class="max-w-6xl mx-auto px-4 sm:px-6 pb-4">
    <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
      <div class="relative flex-1">
        <i class="fas fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style="color:var(--ink-soft)"></i>
        <input id="searchInput" type="text" oninput="onSearchInput(this.value)" data-i18n-placeholder="search_ph"
          class="w-full pl-10 pr-4 py-2.5 rounded-full border bg-[var(--paper-card)] text-sm focus:outline-none focus:ring-2"
          style="border-color:var(--line)">
      </div>
      <div id="categoryPills" class="flex gap-2 overflow-x-auto no-scrollbar pb-1"></div>
    </div>
  </section>

  <!-- ============== PRODUCT GRID ============== -->
  <section class="max-w-6xl mx-auto px-4 sm:px-6 pb-16">
    <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-5"></div>
    <div id="emptyState" class="hidden text-center py-16 flex flex-col items-center"></div>
  </section>
</main>

<!-- ============== FOOTER ============== -->
<footer class="border-t mt-4" style="border-color:var(--line)">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 flex flex-col sm:flex-row justify-between gap-4 text-sm">
    <div>
      <p id="footerStoreName" class="font-bold" style="color:var(--ink)"></p>
      <p id="footerAddress" style="color:var(--ink-soft)"></p>
      <p id="footerPhone" style="color:var(--ink-soft)"></p>
    </div>
    <button onclick="openSyncModal()" data-i18n="staff_sync" class="text-xs underline self-start sm:self-end" style="color:var(--ink-soft)"></button>
  </div>
</footer>

<!-- ============== CART / CHECKOUT DRAWER ============== -->
<div id="drawerOverlay" onclick="closeDrawer()" class="hidden fixed inset-0 bg-black/40 z-40"></div>
<aside id="cartDrawer" class="fixed top-0 right-0 h-full w-full sm:w-[420px] bg-[var(--paper-card)] z-50 translate-x-full transition-transform duration-300 flex flex-col">

  <!-- Cart view -->
  <div id="drawerCartView" class="flex flex-col h-full">
    <div class="flex items-center justify-between px-5 py-4 border-b" style="border-color:var(--line)">
      <h2 data-i18n="your_cart" class="font-black text-lg"></h2>
      <button onclick="closeDrawer()" data-i18n-aria="close" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/5"><i class="fas fa-times"></i></button>
    </div>
    <div id="cartItemsList" class="flex-1 overflow-y-auto"></div>
    <div id="cartFooter" class="hidden border-t p-5 space-y-3" style="border-color:var(--line)">
      <div class="flex items-center justify-between">
        <span data-i18n="subtotal" class="font-bold text-sm"></span>
        <span class="text-right">
          <span id="cartSubtotalUSD" class="font-black text-lg block"></span>
          <span id="cartSubtotalKHR" class="text-xs block" style="color:var(--ink-soft)"></span>
        </span>
      </div>
      <button onclick="goToCheckout()" data-i18n="checkout_btn" class="btn-primary w-full"></button>
    </div>
  </div>

  <!-- Checkout view -->
  <div id="drawerCheckoutView" class="hidden flex flex-col h-full">
    <div class="flex items-center gap-2 px-5 py-4 border-b" style="border-color:var(--line)">
      <button onclick="backToCart()" data-i18n-aria="back" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/5"><i class="fas fa-arrow-left"></i></button>
      <h2 data-i18n="checkout_title" class="font-black text-lg"></h2>
      <button onclick="closeDrawer()" data-i18n-aria="close" class="ml-auto w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/5"><i class="fas fa-times"></i></button>
    </div>
    <div class="flex-1 overflow-y-auto px-5 py-4 space-y-5">
      <div id="checkoutSummary" class="text-sm"></div>

      <div>
        <p data-i18n="contact_details" class="font-bold text-xs uppercase tracking-wide mb-2" style="color:var(--ink-soft)"></p>
        <div class="space-y-2.5">
          <input id="ckName" type="text" data-i18n-placeholder="full_name" class="w-full px-3.5 py-2.5 rounded-lg border text-sm focus:outline-none focus:ring-2" style="border-color:var(--line)">
          <input id="ckPhone" type="tel" data-i18n-placeholder="phone_number" class="w-full px-3.5 py-2.5 rounded-lg border text-sm focus:outline-none focus:ring-2" style="border-color:var(--line)">
          <textarea id="ckNotes" rows="2" data-i18n-placeholder="addr_notes_ph" class="w-full px-3.5 py-2.5 rounded-lg border text-sm focus:outline-none focus:ring-2 resize-none" style="border-color:var(--line)"></textarea>
        </div>
        <p id="checkoutError" data-i18n="required_note" class="hidden text-xs font-bold mt-2" style="color:var(--lacquer)"></p>
      </div>

      <div>
        <p data-i18n="payment_method" class="font-bold text-xs uppercase tracking-wide mb-2" style="color:var(--ink-soft)"></p>
        <div class="space-y-2">
          <div id="codOption" class="pay-option" onclick="selectPayMethod('cod')">
            <i class="fas fa-hand-holding-dollar"></i>
            <span data-i18n="cod"></span>
          </div>
          <div id="khqrOption" class="pay-option" onclick="selectPayMethod('khqr')">
            <i class="fas fa-qrcode"></i>
            <span data-i18n="pay_khqr"></span>
          </div>
        </div>
        <div id="khqrPanel" class="hidden mt-3 p-4 rounded-xl" style="background:var(--paper)"></div>
      </div>

      <p data-i18n="stock_note" class="text-xs" style="color:var(--ink-soft)"></p>
    </div>
    <div class="border-t p-5" style="border-color:var(--line)">
      <button onclick="placeOrder()" data-i18n="place_order" class="btn-primary w-full"></button>
    </div>
  </div>

  <!-- Confirmation view -->
  <div id="drawerConfirmView" class="hidden flex flex-col h-full">
    <div class="flex items-center justify-end px-5 py-4 border-b" style="border-color:var(--line)">
      <button onclick="closeDrawer()" data-i18n-aria="close" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/5"><i class="fas fa-times"></i></button>
    </div>
    <div id="confirmBody" class="flex-1 overflow-y-auto"></div>
  </div>
</aside>

<!-- ============== SYNC MODAL (store staff) ============== -->
<div id="syncModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
  <div class="bg-[var(--paper-card)] rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto">
    <div class="flex items-center justify-between px-5 py-4 border-b" style="border-color:var(--line)">
      <h2 id="syncTitle" data-i18n="sync_title" class="font-black text-lg"></h2>
      <button onclick="closeSyncModal()" data-i18n-aria="close" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/5"><i class="fas fa-times"></i></button>
    </div>
    <div class="p-5 space-y-5">
      <div>
        <p id="syncDesc" data-i18n="sync_desc" class="text-sm mb-3" style="color:var(--ink-soft)"></p>
        <input type="file" id="syncFileInput" accept=".json" onchange="handleCatalogFileUpload(event)" class="hidden">
        <button onclick="document.getElementById('syncFileInput').click()" id="syncChooseBtn" class="btn-primary w-full"><i class="fas fa-upload mr-2"></i><span id="syncChooseLabel"></span></button>
        <p id="syncStatus" class="text-xs mt-2.5" style="color:var(--ink-soft)"></p>
        <button id="resetSyncBtn" onclick="resetToSharedCatalog()" style="display:none; color:var(--lacquer)" class="text-xs font-bold underline mt-1"><span id="resetSyncLabel"></span></button>
      </div>
      <div class="pt-4 border-t" style="border-color:var(--line)">
        <div class="flex items-center justify-between mb-2">
          <p id="pendingOrdersLabel" class="font-bold text-sm"></p>
          <span id="pendingOrdersCount" class="text-xs font-black px-2 py-0.5 rounded-full" style="background:var(--gold-soft)"></span>
        </div>
        <p id="noPendingMsg" class="text-xs" style="color:var(--ink-soft)"></p>
        <div id="pendingOrdersActions" class="flex gap-2 mt-2" style="display:none">
          <button onclick="downloadPendingOrders()" class="btn-secondary flex-1 text-xs !py-2"><i class="fas fa-download mr-1.5"></i><span id="downloadPendingLabel"></span></button>
          <button onclick="clearPendingOrders()" class="btn-secondary flex-1 text-xs !py-2" style="color:var(--lacquer)"><i class="fas fa-trash mr-1.5"></i><span id="clearPendingLabel"></span></button>
        </div>
      </div>
      <button onclick="closeSyncModal()" id="syncCloseBtn" data-i18n="close" class="btn-secondary w-full"></button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ── CONSTANTS ────────────────────────────────────────────────
// ============================================================
const CATALOG_STORAGE_KEY = 'storefront_catalog_override';
const CATALOG_SYNCED_KEY  = 'storefront_catalog_synced_at';
const CART_STORAGE_KEY    = 'storefront_cart';
const LANG_STORAGE_KEY    = 'storefront_lang';
const ORDERS_STORAGE_KEY  = 'storefront_orders';
const CATALOG_FILE_URL    = './storefront-catalog.json';

const PLACEHOLDER_IMG = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="#E7EBE5"/><path d="M50 138 L85 96 L112 124 L138 88 L160 138 Z" fill="#C3CDBF"/><circle cx="72" cy="70" r="13" fill="#C3CDBF"/></svg>'
);

const CATEGORY_ICONS = {
  cat_toys: 'fa-shapes',
  cat_daily: 'fa-basket-shopping',
  cat_elec: 'fa-plug',
  cat_apparel: 'fa-shirt'
};

const DEFAULT_CATALOG = {
  _version: 1,
  _exportDate: null,
  store: { name: 'JC STORE', logo: 'https://via.placeholder.com/150x50?text=JC+STORE', rate: 4100, phone: '', address: '' },
  categories: [
    { key: 'cat_toys',    en: 'Toys',        zh: '玩具',     km: 'ប្រដាប់ក្មេងលេង' },
    { key: 'cat_daily',   en: 'Daily Goods', zh: '日用品',   km: 'ទំនិញប្រើប្រាស់ប្រចាំថ្ងៃ' },
    { key: 'cat_elec',    en: 'Electronics', zh: '电子产品', km: 'គ្រឿងអេឡិចត្រូនិក' },
    { key: 'cat_apparel', en: 'Apparel',     zh: '服饰',     km: 'សម្លៀកបំពាក់' }
  ],
  products: [
    { sku: 'JC-TOY-001', cat: 'cat_toys', price: 25.00, qty: 45,
      img: 'https://images.unsplash.com/photo-1594787318286-3d835c1d207f?auto=format&fit=crop&w=400&q=80',
      name: { en: 'RC Heavy Duty Racing Car', zh: '重型遥控赛车', km: 'ឡានបញ្ជាប្រណាំងធុនធ្ងន់' } },
    { sku: 'JC-DG-0105', cat: 'cat_daily', price: 9.00, qty: 120,
      img: 'https://images.unsplash.com/photo-1610557892470-55d9e80c0bce?auto=format&fit=crop&w=400&q=80',

const state = {
  lang: localStorage.getItem(LANG_STORAGE_KEY) || 'en',
  catalog: null,
  cart: [],
  category: 'all',
  query: '',
  payMethod: 'cod',

// ============================================================
// ── HELPERS ──────────────────────────────────────────────────
// ============================================================
function t(key) {
  return (UI[state.lang] && UI[state.lang][key]) || UI.en[key] || key;
}
function escapeHtml(str) {
  return String(str == null ? '' : str).replace(/[&<>"']/g, function(m) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m];
  });
}
function escapeJs(str) {
  return String(str == null ? '' : str).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
function fmtUSD(v) { return '$' + (Number(v)||0).toFixed(2); }
function fmtKHR(v) {
  const rate = (state.catalog && state.catalog.store && state.catalog.store.rate) || 4100;
  return Math.round((Number(v)||0) * rate).toLocaleString() + ' \u17DB';
}
function joinList(items, lang) {
  items = items.filter(Boolean);
  if (!items.length) return '';
  if (items.length === 1) return items[0];
  if (lang === 'zh') return items.slice(0, -1).join('\u3001') + '\u548C' + items[items.length-1];
  if (lang === 'km') return items.slice(0, -1).join(', ') + ' \u1793\u17B7\u1784 ' + items[items.length-1];
  return items.slice(0, -1).join(', ') + ', and ' + items[items.length-1];
}
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function applyStaticI18n() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  document.querySelectorAll('[data-i18n-aria]').forEach(function(el) {
    el.setAttribute('aria-label', t(el.getAttribute('data-i18n-aria')));
  });
}

function showToast(message, type) {
  type = type || 'success';
  const colors = { success: 'var(--jade)', error: 'var(--lacquer)', info: '#2563eb' };
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.style.background = colors[type] || colors.success;
  el.textContent = message;
  container.appendChild(el);
  requestAnimationFrame(function() { el.classList.add('show'); });
  setTimeout(function() {
    el.classList.remove('show');
    setTimeout(function(){ el.remove(); }, 300);
  }, 2600);
}

// ── CATALOG LOADING ──────────────────────────────────────────
// ============================================================
async function loadCatalog() {
  try {
    const override = localStorage.getItem(CATALOG_STORAGE_KEY);
    if (override) {
      const parsed = JSON.parse(override);
      if (parsed && Array.isArray(parsed.products)) { state.catalog = parsed; return; }
    }
  } catch(e) {}

  try {
    const res = await fetch(CATALOG_FILE_URL, { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      if (data && Array.isArray(data.products)) { state.catalog = data; return; }
    }
  } catch(e) { /* likely opened locally, or no catalog file deployed yet */ }

  state.catalog = DEFAULT_CATALOG;
}

function renderAll() {
  document.documentElement.lang = state.lang;
  document.body.className = 'lang-' + state.lang;
  document.querySelectorAll('.lang-pill').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.lang === state.lang);
  });

  const store = state.catalog.store || {};
  const logoEl = document.getElementById('storeLogo');
  logoEl.src = store.logo || PLACEHOLDER_IMG;
  logoEl.alt = store.name || 'Store logo';
  logoEl.onerror = function() { this.onerror = null; this.src = PLACEHOLDER_IMG; };
  document.getElementById('storeName').textContent = store.name || 'STORE';

  const names = (state.catalog.categories || []).map(function(c) { return c[state.lang] || c.en; });
  document.getElementById('heroHeadline').textContent = t('hero_headline').replace('{categories}', joinList(names, state.lang));

  renderCategoryTilesAndPills();
  renderProducts();
  renderFooter();
  renderCartBadge();
  applyStaticI18n();
}

function renderCategoryTilesAndPills() {
  const cats = state.catalog.categories || [];

  const pills = ['<button class="cat-pill ' + (state.category === 'all' ? 'active' : '') + '" onclick="setCategory(\'all\')">' + escapeHtml(t('browse_all')) + '</button>']
    .concat(cats.map(function(c) {
      return '<button class="cat-pill ' + (state.category === c.key ? 'active' : '') + '" onclick="setCategory(\'' + escapeJs(c.key) + '\')">' + escapeHtml(c[state.lang] || c.en) + '</button>';
    }));
  document.getElementById('categoryPills').innerHTML = pills.join('');

  const tiles = cats.map(function(c) {
    const icon = CATEGORY_ICONS[c.key] || 'fa-tag';
    return '<button class="cat-tile" onclick="setCategory(\'' + escapeJs(c.key) + '\'); scrollToProducts();">' +
      '<i class="fas ' + icon + '"></i><span>' + escapeHtml(c[state.lang] || c.en) + '</span></button>';
  });
  document.getElementById('categoryTiles').innerHTML = tiles.join('');
}

function renderProducts() {
  const q = state.query.trim().toLowerCase();
  const allProducts = state.catalog.products || [];
  const list = allProducts.filter(function(p) {
    if (state.category !== 'all' && p.cat !== state.category) return false;
    if (q) {
      const name = ((p.name && (p.name[state.lang] || p.name.en)) || '').toLowerCase();
      if (name.indexOf(q) === -1) return false;
    }
    return true;
  });

  const grid = document.getElementById('productGrid');
  const empty = document.getElementById('emptyState');

  if (list.length) {
    grid.classList.remove('hidden');
    empty.classList.add('hidden');
    grid.innerHTML = list.map(productCard).join('');
    return;
  }

  grid.classList.add('hidden');
  grid.innerHTML = '';
  empty.classList.remove('hidden');

  if (q) {
    empty.innerHTML =
      '<i class="fas fa-magnifying-glass text-4xl mb-3" style="color:var(--line)"></i>' +
      '<p class="font-bold text-lg">' + escapeHtml(t('no_results_title').replace('{q}', state.query.trim())) + '</p>' +
      '<p class="text-sm mt-1" style="color:var(--ink-soft)">' + escapeHtml(t('no_results_sub')) + '</p>' +
      '<button onclick="clearSearch()" class="mt-4 px-5 py-2.5 rounded-full text-sm font-bold text-white" style="background:var(--jade)">' + escapeHtml(t('clear_search')) + '</button>';
  } else if (!allProducts.length) {
    empty.innerHTML =
      '<i class="fas fa-store-slash text-4xl mb-3" style="color:var(--line)"></i>' +
      '<p class="font-bold text-lg">' + escapeHtml(t('no_products_yet')) + '</p>';
  } else {
    empty.innerHTML =
      '<i class="fas fa-box-open text-4xl mb-3" style="color:var(--line)"></i>' +
      '<p class="font-bold text-lg">' + escapeHtml(t('no_products_category')) + '</p>' +
      '<button onclick="setCategory(\'all\')" class="mt-4 px-5 py-2.5 rounded-full text-sm font-bold text-white" style="background:var(--jade)">' + escapeHtml(t('browse_all')) + '</button>';
  }
}

function productCard(p) {
  const name = (p.name && (p.name[state.lang] || p.name.en)) || p.sku;
  const cat = (state.catalog.categories || []).find(function(c) { return c.key === p.cat; });
  const catName = cat ? (cat[state.lang] || cat.en) : '';
  const qty = Number(p.qty) || 0;
  const stockState = qty <= 0 ? 'out' : (qty <= 5 ? 'low' : 'in');
  const inCart = state.cart.find(function(c) { return c.sku === p.sku; });
  const cartQty = inCart ? inCart.qty : 0;

  let stockBadge = '';
  if (stockState === 'out') stockBadge = '<span class="stock-badge stock-out">' + escapeHtml(t('out_of_stock')) + '</span>';
  else if (stockState === 'low') stockBadge = '<span class="stock-badge stock-low">' + escapeHtml(t('only_left').replace('{n}', qty)) + '</span>';

  let actionHtml;
  if (stockState === 'out') {
    actionHtml = '<button class="btn-add is-disabled" disabled>' + escapeHtml(t('out_of_stock')) + '</button>';
  } else if (cartQty > 0) {
    actionHtml = '<div class="qty-stepper">' +
      '<button onclick="changeQty(\'' + escapeJs(p.sku) + '\', ' + (cartQty - 1) + ')">\u2212</button>' +
      '<span>' + cartQty + '</span>' +
      '<button onclick="changeQty(\'' + escapeJs(p.sku) + '\', ' + (cartQty + 1) + ')" ' + (cartQty >= qty ? 'disabled' : '') + '>+</button>' +
      '</div>';
  } else {
    actionHtml = '<button class="btn-add" onclick="addToCart(\'' + escapeJs(p.sku) + '\')"><i class="fas fa-plus mr-1.5"></i>' + escapeHtml(t('add_to_cart')) + '</button>';
  }

  return '<div class="product-card">' +
    '<div class="product-card-img">' +
      '<img src="' + (p.img || PLACEHOLDER_IMG) + '" alt="' + escapeHtml(name) + '" loading="lazy" onerror="this.onerror=null;this.src=\'' + PLACEHOLDER_IMG + '\'">' +
      stockBadge +
    '</div>' +
    '<div class="product-card-body">' +
      (catName ? '<p class="product-cat">' + escapeHtml(catName) + '</p>' : '') +
      '<h3 class="product-name">' + escapeHtml(name) + '</h3>' +
      '<div class="price-tag"><span class="usd">' + fmtUSD(p.price) + '</span><span class="khr">' + fmtKHR(p.price) + '</span></div>' +
      actionHtml +
    '</div>' +
  '</div>';
}

function renderFooter() {
  const store = state.catalog.store || {};
  document.getElementById('footerStoreName').textContent = store.name || '';
  const addrEl = document.getElementById('footerAddress');
  const phoneEl = document.getElementById('footerPhone');
  addrEl.textContent = store.address || '';
  addrEl.style.display = store.address ? '' : 'none';
  phoneEl.textContent = store.phone || '';
  phoneEl.style.display = store.phone ? '' : 'none';
}

function renderCartBadge() {
  const count = state.cart.reduce(function(s,c){ return s + c.qty; }, 0);
  const badge = document.getElementById('cartBadge');
  if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}
function bounceCart() {
  const btn = document.getElementById('cartBtn');
  btn.classList.remove('cart-bounce');
  void btn.offsetWidth;
  btn.classList.add('cart-bounce');
}

// ============================================================
// ── CART ─────────────────────────────────────────────────────
// ============================================================
function saveCart() { localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(state.cart)); }

function cartLines() {
  return state.cart.map(function(c) {
    const p = (state.catalog.products || []).find(function(x){ return x.sku === c.sku; });
    if (!p) return null;
    return { sku: c.sku, qty: c.qty, price: p.price, name: (p.name && (p.name[state.lang] || p.name.en)) || c.sku, img: p.img };
  }).filter(Boolean);
}
function cartTotal() { return cartLines().reduce(function(s,l){ return s + l.qty * l.price; }, 0); }

function addToCart(sku) {
  const p = (state.catalog.products || []).find(function(x){ return x.sku === sku; });
  if (!p) return;
  const existing = state.cart.find(function(c){ return c.sku === sku; });
  if (existing) existing.qty = Math.min(existing.qty + 1, p.qty);
  else state.cart.push({ sku: sku, qty: 1 });
  saveCart();
  renderProducts();
  renderCartBadge();
  renderCartItems();
  bounceCart();
  showToast(t('added_to_cart'), 'success');
}

function changeQty(sku, qty) {
  qty = parseInt(qty, 10) || 0;
  const p = (state.catalog.products || []).find(function(x){ return x.sku === sku; });
  const maxQty = p ? p.qty : 999;
  if (qty <= 0) {
    state.cart = state.cart.filter(function(c){ return c.sku !== sku; });
  } else {
    const item = state.cart.find(function(c){ return c.sku === sku; });
    if (item) item.qty = Math.min(qty, maxQty);
  }
  saveCart();
  renderProducts();
  renderCartBadge();
  renderCartItems();
}

function removeFromCart(sku) {
  state.cart = state.cart.filter(function(c){ return c.sku !== sku; });
  saveCart();
  renderProducts();
  renderCartBadge();
  renderCartItems();
}

function renderCartItems() {
  const lines = cartLines();
  const wrap = document.getElementById('cartItemsList');
  const footer = document.getElementById('cartFooter');

  if (!lines.length) {
    wrap.innerHTML =
      '<div class="flex flex-col items-center justify-center h-full text-center px-8 py-16">' +
        '<i class="fas fa-basket-shopping text-4xl mb-3" style="color:var(--line)"></i>' +
        '<p class="font-bold">' + escapeHtml(t('cart_empty')) + '</p>' +
        '<button onclick="closeDrawer()" class="mt-4 px-4 py-2 rounded-full text-sm font-bold text-white" style="background:var(--jade)">' + escapeHtml(t('start_shopping')) + '</button>' +
      '</div>';
    footer.classList.add('hidden');
    return;
  }

  footer.classList.remove('hidden');
  wrap.innerHTML = lines.map(function(l) {
    return '<div class="cart-line">' +
      '<img src="' + (l.img || PLACEHOLDER_IMG) + '" onerror="this.onerror=null;this.src=\'' + PLACEHOLDER_IMG + '\'">' +
      '<div class="cart-line-info">' +
        '<p class="cart-line-name">' + escapeHtml(l.name) + '</p>' +
        '<div class="price-tag price-tag-flat"><span class="usd">' + fmtUSD(l.price) + '</span><span class="khr">' + fmtKHR(l.price) + '</span></div>' +
      '</div>' +
      '<div class="flex flex-col items-end gap-1.5">' +
        '<div class="qty-stepper">' +
          '<button onclick="changeQty(\'' + escapeJs(l.sku) + '\', ' + (l.qty - 1) + ')">\u2212</button>' +
          '<span>' + l.qty + '</span>' +
          '<button onclick="changeQty(\'' + escapeJs(l.sku) + '\', ' + (l.qty + 1) + ')">+</button>' +
        '</div>' +
        '<button class="cart-line-remove" onclick="removeFromCart(\'' + escapeJs(l.sku) + '\')"><i class="fas fa-trash"></i></button>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('cartSubtotalUSD').textContent = fmtUSD(cartTotal());
  document.getElementById('cartSubtotalKHR').textContent = fmtKHR(cartTotal());
}

// ============================================================
// ── DRAWER NAVIGATION ────────────────────────────────────────
// ============================================================
function openDrawer(view) {
  document.getElementById('drawerOverlay').classList.remove('hidden');
  document.getElementById('cartDrawer').classList.remove('translate-x-full');
  showDrawerView(view || 'cart');
}
function closeDrawer() {
  document.getElementById('drawerOverlay').classList.add('hidden');
  document.getElementById('cartDrawer').classList.add('translate-x-full');
}
function showDrawerView(view) {
  ['cart','checkout','confirm'].forEach(function(v) {
    document.getElementById('drawer' + capitalize(v) + 'View').classList.toggle('hidden', v !== view);
  });
  if (view === 'cart') renderCartItems();
  if (view === 'checkout') renderCheckoutView();
}
function goToCheckout() {
  if (!cartLines().length) return;
  showDrawerView('checkout');
}
function backToCart() { showDrawerView('cart'); }

// ============================================================
// ── CHECKOUT ─────────────────────────────────────────────────
// ============================================================
function renderCheckoutView() {
  const lines = cartLines();
  document.getElementById('checkoutSummary').innerHTML = lines.map(function(l) {
    return '<div class="flex justify-between py-1"><span style="color:var(--ink-soft)">' + escapeHtml(l.name) + ' \u00D7 ' + l.qty + '</span><span class="font-bold">' + fmtUSD(l.price * l.qty) + '</span></div>';
  }).join('') +
  '<div class="flex justify-between pt-2 mt-2 border-t font-black" style="border-color:var(--line)">' +
    '<span>' + escapeHtml(t('subtotal')) + '</span>' +
    '<span>' + fmtUSD(cartTotal()) + ' <span class="text-xs font-medium" style="color:var(--ink-soft)">/ ' + fmtKHR(cartTotal()) + '</span></span>' +
  '</div>';

  const khqrList = (state.catalog.payment && state.catalog.payment.khqr) || [];
  document.getElementById('khqrOption').style.display = khqrList.length ? 'flex' : 'none';
  selectPayMethod(state.payMethod === 'khqr' && khqrList.length ? 'khqr' : 'cod');
}

function selectPayMethod(method) {
  state.payMethod = method;
  document.getElementById('codOption').classList.toggle('selected', method === 'cod');
  document.getElementById('khqrOption').classList.toggle('selected', method === 'khqr');
  const panel = document.getElementById('khqrPanel');
  const khqrList = (state.catalog.payment && state.catalog.payment.khqr) || [];
  if (method === 'khqr' && khqrList.length) {
    panel.classList.remove('hidden');
    panel.innerHTML = khqrList.map(function(k) {
      return '<div class="text-center' + (khqrList.length > 1 ? ' mb-4 pb-4 border-b' : '') + '" style="border-color:var(--line)">' +
        '<img src="' + k.qr + '" class="w-40 h-40 mx-auto rounded-lg border bg-white" style="border-color:var(--line)" onerror="this.onerror=null;this.src=\'' + PLACEHOLDER_IMG + '\'">' +
        '<p class="font-bold mt-2">' + escapeHtml(k.bank || '') + '</p>' +
        '<p class="text-sm" style="color:var(--ink-soft)">' + escapeHtml(k.merchant || '') + (k.account ? ' \u00B7 ' + escapeHtml(k.account) : '') + '</p>' +
      '</div>';
    }).join('') + '<p class="text-center text-xs mt-1" style="color:var(--ink-soft)">' + escapeHtml(t('scan_to_pay')) + '</p>';
  } else {
    panel.classList.add('hidden');
    panel.innerHTML = '';
  }
}

function placeOrder() {
  const name = document.getElementById('ckName').value.trim();
  const phone = document.getElementById('ckPhone').value.trim();
  const notes = document.getElementById('ckNotes').value.trim();
  const errEl = document.getElementById('checkoutError');

  if (!name || !phone) { errEl.classList.remove('hidden'); return; }
  errEl.classList.add('hidden');

  const lines = cartLines();
  if (!lines.length) return;

  const order = {
    id: 'JC-' + Date.now().toString(36).toUpperCase(),
    ts: new Date().toISOString(),
    customer: { name: name, phone: phone, notes: notes },
    payMethod: state.payMethod,
    items: lines.map(function(l){ return { sku: l.sku, name: l.name, qty: l.qty, unitPrice: l.price }; }),
    total: cartTotal()
  };

  let orders = [];
  try { orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY)) || []; } catch(e) {}
  orders.push(order);
  localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(orders));

  state.lastOrder = order;
  state.cart = [];
  saveCart();
  renderProducts();
  renderCartBadge();

  document.getElementById('ckName').value = '';
  document.getElementById('ckPhone').value = '';
  document.getElementById('ckNotes').value = '';

  renderConfirmView();
  showDrawerView('confirm');
}

// ============================================================
// ── CONFIRMATION ─────────────────────────────────────────────
// ============================================================
function orderSummaryText(order) {
  const store = state.catalog.store || {};
  const lines = order.items.map(function(i){ return i.name + ' \u00D7 ' + i.qty + ' \u2014 ' + fmtUSD(i.unitPrice * i.qty); }).join('\n');
  return [
    (store.name || 'Store') + ' \u2014 ' + t('order_number') + ': ' + order.id,
    lines,
    t('subtotal') + ': ' + fmtUSD(order.total) + ' / ' + fmtKHR(order.total),
    '',
    t('full_name') + ': ' + order.customer.name,
    t('phone_number') + ': ' + order.customer.phone,
    order.customer.notes ? (t('addr_notes_ph') + ': ' + order.customer.notes) : null,
    t('payment_method') + ': ' + (order.payMethod === 'khqr' ? t('pay_khqr') : t('cod'))
  ].filter(function(x){ return x !== null; }).join('\n');
}

function renderConfirmView() {
  const order = state.lastOrder;
  if (!order) return;
  const store = state.catalog.store || {};
  const phoneDigits = (store.phone || '').replace(/[^0-9]/g, '');

  let html = '<div class="text-center py-8 px-6">' +
    '<i class="fas fa-circle-check text-5xl" style="color:var(--jade)"></i>' +
    '<h3 class="text-xl font-black mt-3">' + escapeHtml(t('order_placed')) + '</h3>' +
    '<p class="text-sm mt-1" style="color:var(--ink-soft)">' + escapeHtml(t('order_thanks')) + '</p>' +
    '<p class="mt-4 text-xs font-bold uppercase tracking-wide" style="color:var(--ink-soft)">' + escapeHtml(t('order_number')) + '</p>' +
    '<div class="mt-1 inline-block px-4 py-2 rounded-full font-mono font-black" style="background:var(--gold-soft); color:var(--ink)">' + escapeHtml(order.id) + '</div>' +
  '</div>' +
  '<div class="px-6 pb-8 space-y-2.5">';

  if (phoneDigits) {
    html += '<a href="https://wa.me/' + phoneDigits + '?text=' + encodeURIComponent(orderSummaryText(order)) + '" target="_blank" rel="noopener" class="btn-primary w-full block text-center"><i class="fab fa-whatsapp mr-2"></i>' + escapeHtml(t('whatsapp_btn')) + '</a>';
  }
  html += '<button onclick="copyOrderSummary()" class="btn-secondary w-full"><i class="fas fa-copy mr-2"></i>' + escapeHtml(t('copy_btn')) + '</button>';
  html += '<button onclick="downloadOrder()" class="btn-secondary w-full"><i class="fas fa-download mr-2"></i>' + escapeHtml(t('download_btn')) + '</button>';
  html += '<button onclick="closeDrawer()" class="w-full text-center text-sm font-bold py-2" style="color:var(--ink-soft)">' + escapeHtml(t('continue_shopping')) + '</button>';
  html += '</div>';

  document.getElementById('confirmBody').innerHTML = html;
}

function copyOrderSummary() {
  if (!state.lastOrder) return;
  const text = orderSummaryText(state.lastOrder);
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(
      function(){ showToast(t('copied'), 'success'); },
      function(){ fallbackCopy(text); }
    );
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    const ok = document.execCommand('copy');
    showToast(ok ? t('copied') : t('copy_btn'), ok ? 'success' : 'info');
  } catch(e) {
    showToast(t('copy_btn'), 'info');
  }
  document.body.removeChild(ta);
}
function downloadOrder() {
  if (!state.lastOrder) return;
  const blob = new Blob([JSON.stringify(state.lastOrder, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'order-' + state.lastOrder.id + '.json'; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// ── SEARCH / CATEGORY ────────────────────────────────────────
// ============================================================
function onSearchInput(v) { state.query = v; renderProducts(); }
function clearSearch() { state.query = ''; document.getElementById('searchInput').value = ''; renderProducts(); }
function setCategory(key) { state.category = key; renderCategoryTilesAndPills(); renderProducts(); }
function scrollToProducts() { document.getElementById('productGrid').scrollIntoView({ behavior: 'smooth', block: 'start' }); }

// ============================================================
// ── LANGUAGE ─────────────────────────────────────────────────
// ============================================================
function setLang(lang) {
  state.lang = lang;
  localStorage.setItem(LANG_STORAGE_KEY, lang);
  renderAll();
  const drawerOpen = !document.getElementById('cartDrawer').classList.contains('translate-x-full');
  if (drawerOpen) {
    if (!document.getElementById('drawerCartView').classList.contains('hidden')) renderCartItems();
    else if (!document.getElementById('drawerCheckoutView').classList.contains('hidden')) renderCheckoutView();
    else if (!document.getElementById('drawerConfirmView').classList.contains('hidden')) renderConfirmView();
  }
  if (!document.getElementById('syncModal').classList.contains('hidden')) renderSyncModal();
}

// ============================================================
// ── STAFF SYNC MODAL ─────────────────────────────────────────
// ============================================================
function openSyncModal() {
  renderSyncModal();
  document.getElementById('syncModal').classList.remove('hidden');
}
function closeSyncModal() { document.getElementById('syncModal').classList.add('hidden'); }

function renderSyncModal() {
  applyStaticI18n();
  document.getElementById('syncChooseLabel').textContent = t('choose_file');
  document.getElementById('resetSyncLabel').textContent = t('reset_sync');

  const syncedAt = localStorage.getItem(CATALOG_SYNCED_KEY);
  const usingOverride = !!localStorage.getItem(CATALOG_STORAGE_KEY);
  const statusEl = document.getElementById('syncStatus');
  if (usingOverride && syncedAt) {
    statusEl.textContent = t('last_synced') + ': ' + new Date(syncedAt).toLocaleString();
  } else if (state.catalog === DEFAULT_CATALOG) {
    statusEl.textContent = t('using_demo');
  } else {
    statusEl.textContent = t('using_shared');
  }
  document.getElementById('resetSyncBtn').style.display = usingOverride ? 'block' : 'none';

  document.getElementById('pendingOrdersLabel').textContent = t('pending_orders');
  document.getElementById('downloadPendingLabel').textContent = t('download_pending');
  document.getElementById('clearPendingLabel').textContent = t('clear_pending');
  document.getElementById('noPendingMsg').textContent = t('no_pending');

  let orders = [];
  try { orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY)) || []; } catch(e) {}
  document.getElementById('pendingOrdersCount').textContent = orders.length;
  document.getElementById('noPendingMsg').style.display = orders.length ? 'none' : 'block';
  document.getElementById('pendingOrdersActions').style.display = orders.length ? 'flex' : 'none';
}

function handleCatalogFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data || !Array.isArray(data.products)) throw new Error('bad format');
      localStorage.setItem(CATALOG_STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem(CATALOG_SYNCED_KEY, new Date().toISOString());
      state.catalog = data;
      renderAll();
      renderCartItems();
      renderSyncModal();
      showToast('Catalog synced.', 'success');
    } catch (err) {
      showToast('Could not read that file.', 'error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function resetToSharedCatalog() {
  localStorage.removeItem(CATALOG_STORAGE_KEY);
  localStorage.removeItem(CATALOG_SYNCED_KEY);
  loadCatalog().then(function() {
    renderAll();
    renderCartItems();
    renderSyncModal();
  });
}

function downloadPendingOrders() {
  let orders = [];
  try { orders = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY)) || []; } catch(e) {}
  if (!orders.length) return;
  const blob = new Blob([JSON.stringify({ orders: orders }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'online-orders-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
  URL.revokeObjectURL(url);
}
function clearPendingOrders() {
  if (!confirm(t('clear_pending_confirm'))) return;
  localStorage.removeItem(ORDERS_STORAGE_KEY);
  renderSyncModal();
}

// ============================================================
// ── INIT ─────────────────────────────────────────────────────
// ============================================================
document.addEventListener('DOMContentLoaded', async function() {
  await loadCatalog();
  renderAll();
  renderCartItems();

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeDrawer();
      closeSyncModal();
    }
  });
});
</script>
</body>
</html>
